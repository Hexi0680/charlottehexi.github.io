<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charlotte Liu · 刘赫熙</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%23a8d8c8'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='22' font-weight='700' fill='%23fff' letter-spacing='1'>CL</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&family=Jost:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* 🎨 颜色变量 */
    :root {
      --mint:       #a8d8c8;
      --mint-light: #d6efe8;
      --mint-pale:  #f0faf6;
      --mint-deep:  #6db8a0;
      --ink:        #1a2621;
      --ink-mid:    #3d5249;
      --ink-soft:   #6b8a7e;
      --cream:      #fafaf8;
      --white:      #ffffff;
      --serif:      'Cormorant Garamond', Georgia, serif;
      --serif-zh:   'Noto Serif SC', serif;
      --sans:       'Jost', sans-serif;
      --cursive:    'Dancing Script', cursive;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--ink); font-weight: 300; line-height: 1.7; overflow-x: hidden; }

    /* ━━ 导航栏 ━━ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 3rem;
      background: rgba(250,250,248,0.88); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(168,216,200,0.3);
    }
    .nav-logo {
      width: 38px; height: 38px; background: var(--mint); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 15px; font-weight: 600;
      color: var(--white); letter-spacing: 1px; text-decoration: none;
    }
    /* ✏️ 导航链接：复制 <li> 可加新页面 */
    .nav-links { display: flex; gap: 2.4rem; list-style: none; }
    .nav-links a {
      font-size: 0.8rem; font-weight: 400; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink-mid); text-decoration: none; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--mint-deep); }

    /* ━━ 主页（全屏居中）━━ */
    #home {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding-top: 72px; text-align: center;
    }

    /* ✏️ 英文草书签名 */
    .hero-name-cursive {
      font-family: var(--cursive);
      font-size: clamp(4.5rem, 9vw, 8rem);
      font-weight: 700; color: var(--ink); line-height: 1.1;
      opacity: 0;
      animation: fade-up-in 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
      animation-delay: 0.2s;
    }

    /* ✏️ 中文名 */
    .hero-name-zh {
      font-family: var(--serif-zh);
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 300; color: var(--mint-deep); letter-spacing: 0.4em;
      margin-top: 0.4rem;
      opacity: 0;
      animation: fade-up-in 0.9s ease forwards;
      animation-delay: 0.9s;
    }

    .hero-divider {
      width: 48px; height: 1px; background: var(--mint); margin: 1.8rem auto;
      opacity: 0; animation: fade-up-in 0.7s ease forwards; animation-delay: 1.3s;
    }

    /* ✏️ 主页副标题 */
    .hero-sub {
      font-size: 0.92rem; color: var(--ink-soft); line-height: 2;
      opacity: 0; animation: fade-up-in 0.7s ease forwards; animation-delay: 1.5s;
    }

    /* Learn more 按钮 → 跳到 about.html */
    .hero-cta {
      display: inline-block; margin-top: 2.2rem; padding: 0.8rem 2rem;
      border: 1px solid var(--mint); color: var(--ink-mid); text-decoration: none;
      font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase;
      transition: all 0.25s; font-weight: 400;
      opacity: 0; animation: fade-up-in 0.7s ease forwards; animation-delay: 1.7s;
    }
    .hero-cta:hover { background: var(--mint); color: var(--white); }

    /* ━━ Contact（图标）━━ */
    #contact { border-top: 1px solid var(--mint-light); padding: 3rem 0; }
    .contact-icons { display: flex; gap: 1rem; justify-content: center; margin-top: 1.2rem; }
    .section-label { font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mint-deep); font-weight: 400; text-align: center; }
    .contact-icon-btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s; text-decoration: none;
    }
    .contact-icon-btn:hover { background: var(--mint-deep); transform: scale(1.08); }
    .contact-icon-btn svg { width: 20px; height: 20px; stroke: var(--white); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ━━ 页脚 ━━ */
    footer {
      text-align: center; padding: 2rem 1rem;
      font-size: 0.8rem; color: var(--ink-soft);
      letter-spacing: 0.05em; border-top: 1px solid var(--mint-light); line-height: 2;
    }
    /* ✏️ Quote */
    .footer-quote { font-family: var(--serif-zh); font-size: 1rem; color: var(--ink-soft); display: block; margin-bottom: 0.3rem; }

    /* ━━ 动画 ━━ */
    @keyframes fade-up-in { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* ━━ 手机端 ━━ */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- 导航栏 -->
  <nav>
    <a href="index.html" class="nav-logo">CL</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <!-- About 跳到独立页面 -->
      <li><a href="about.html">About</a></li>
      <!-- CV 直接打开 PDF -->
      <li><a href="docs/cv-website.pdf" target="_blank">CV</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>


  <!-- 主页全屏 -->
  <section id="home">
    <!-- ✏️ 英文草书签名 -->
    <p class="hero-name-cursive">Charlotte Liu</p>
    <!-- ✏️ 中文名 -->
    <p class="hero-name-zh">刘 赫 熙</p>
    <div class="hero-divider"></div>
    <!-- ✏️ 副标题 -->
    <p class="hero-sub">
      Molecular and Cell Biology<br>
      University of California, San Diego<br>
      <span style="font-size:0.85rem;">hel061@ucsd.edu</span>
    </p>
    <!-- Learn more 跳到 about.html -->
    <a href="about.html" class="hero-cta">Learn more</a>
  </section>


  <!-- Contact -->
  <section id="contact">
    <div style="text-align:center; padding: 0 1rem;">
      <p class="section-label">Get in touch</p>
      <div class="contact-icons">
        <!-- ✏️ 邮箱 -->
        <a href="mailto:hel061@ucsd.edu" class="contact-icon-btn" title="Email">
          <svg viewBox="0 0 20 20"><rect x="2" y="4" width="16" height="12" rx="2"/><path d="M2 6l8 6 8-6"/></svg>
        </a>
        <!-- ✏️ LinkedIn -->
        <a href="https://www.linkedin.com/in/hexi-liu-0344672b5" target="_blank" class="contact-icon-btn" title="LinkedIn">
          <svg viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="3"/><path d="M6 9v5M6 7v.01M10 14v-3c0-1 .8-2 2-2s2 1 2 2v3"/></svg>
        </a>
      </div>
    </div>
  </section>


  <!-- ✏️ 页脚 -->
  <footer>
    <span class="footer-quote">「路虽远，行之将至」</span>
    © 2026 Charlotte Liu · 刘赫熙 &nbsp;·&nbsp; Built with care
  </footer>

</body>
</html>
